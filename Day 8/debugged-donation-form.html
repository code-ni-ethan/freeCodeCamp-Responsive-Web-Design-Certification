<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donation Form</title>
</head>
<body>
  <h1>Donation Form</h1>
  <form>
    
    <label for="name">
    Full Name:
    <input required type="text" name="name" id="name">
    </label>

  <label for="email">
    Email Address:
    <input required type="email" name="email" id="email">
    </label>

  <label for="donation">
    Donation Amount ($):
    <input required type="number" name="amount" id="donation">
    </label>

  <label for="checkbox">
    <input type="checkbox" name="newsletter" id="checkbox">
    Subscribe
    </label>

    <input type="submit" value="Send">
  </form>
</body>
</html>
